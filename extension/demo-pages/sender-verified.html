<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Inbox - IT Maintenance Notice</title>
<style>
  body { margin: 0; font-family: -apple-system, "Segoe UI", system-ui, sans-serif; background-color: #f6f7f9; color: #1b1b1b; }
  .message { max-width: 640px; margin: 30px auto; background-color: #ffffff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 24px; }
  .from-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
  .from-name { font-weight: 700; }
  .from-email { color: #5f6368; font-size: 13px; }
  .subject { font-size: 18px; font-weight: 700; margin: 10px 0 16px 0; }
  .body p { line-height: 1.6; }
  a { color: #1a73e8; }
</style>
</head>
<body>
  <div class="message">
    <div class="from-row">
      <span class="from-name" email="it@company.com">IT Support</span>
      <span class="from-email">&lt;it@company.com&gt;</span>
    </div>
    <div class="subject">Scheduled maintenance this weekend</div>
    <div class="body">
      <p>Hi team,</p>
      <p>We'll be performing routine maintenance on the VPN this Saturday from 9pm to 11pm. No action is needed on your part.</p>
      <p>Details: <a href="https://company.com/status">company.com/status</a></p>
      <p>Thanks,<br />IT Support</p>
    </div>
  </div>
</body>
</html>
