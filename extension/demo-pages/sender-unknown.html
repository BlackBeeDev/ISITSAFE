<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Inbox - Quick Question</title>
<style>
  body { margin: 0; font-family: -apple-system, "Segoe UI", system-ui, sans-serif; background-color: #f6f7f9; color: #1b1b1b; }
  .message { max-width: 640px; margin: 30px auto; background-color: #ffffff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 24px; }
  .from-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
  .from-name { font-weight: 700; }
  .from-email { color: #5f6368; font-size: 13px; }
  .subject { font-size: 18px; font-weight: 700; margin: 10px 0 16px 0; }
  .body p { line-height: 1.6; }
</style>
</head>
<body>
  <div class="message">
    <div class="from-row">
      <span class="from-name" email="jordan.lee@partneragency.io">Jordan Lee</span>
      <span class="from-email">&lt;jordan.lee@partneragency.io&gt;</span>
    </div>
    <div class="subject">Quick question about the contract</div>
    <div class="body">
      <p>Hi there,</p>
      <p>Could you send over the latest version of the contract when you get a chance?</p>
      <p>Thanks,<br />Jordan</p>
    </div>
  </div>
</body>
</html>
